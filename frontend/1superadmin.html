<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agendare — Super Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
<div class="dashboard">

  <div class="topbar">
    <div class="topbar-brand">
      <h2 style="color:var(--accent)">📅 Agendare</h2>
    </div>
    <div class="topbar-user">
      <span style="color:var(--accent);font-weight:600">👑 Super Admin</span>
      <button class="btn-logout" onclick="logout()">Sair</button>
    </div>
  </div>

  <div class="tabs" style="display:flex">
    <button class="tab active" onclick="mudarAba('empresas')">🏢 Empresas</button>
    <button class="tab" onclick="mudarAba('nova')">➕ Nova Empresa</button>
  </div>

  <div class="content-wrapper">

    <!-- EMPRESAS -->
    <div class="main-content" id="abaEmpresas">
      <div class="page-title">Gestão de <span>Empresas</span></div>

      <div class="table-card">
        <div class="table-header" style="flex-direction:column;align-items:flex-start;gap:1rem;">
          <h2>Empresas Cadastradas</h2>
          <div style="display:flex;gap:0.75rem;width:100%;max-width:500px;">
            <input type="text" id="pesquisaEmpresas" placeholder="🔍 Buscar empresa..."
              oninput="filtrarEmpresas()" style="flex:1;" />
            <button class="btn-sm" onclick="limparBusca()">✕</button>
          </div>
        </div>

        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Empresa</th>
                <th>CNPJ</th>
                <th>E-mail</th>
                <th>Vencimento</th>
                <th>Status</th>
                <th>Usuários</th>
                <th>Ações</th>
              </tr>
            </thead>
            <tbody id="tabelaEmpresas"></tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- NOVA EMPRESA -->
    <div class="main-content" id="abaNova" style="display:none">
      <div class="page-title">Nova <span>Empresa</span></div>

      <div class="table-card">
        <div style="padding:1.5rem">
          <div class="form-grid">
            <div class="form-group">
              <label>CNPJ *</label>
              <input type="text" id="nCnpj" />
            </div>
            <div class="form-group">
              <label>Nome Fantasia *</label>
              <input type="text" id="nNome" />
            </div>
            <div class="form-group">
              <label>E-mail</label>
              <input type="email" id="nEmail" />
            </div>
            <div class="form-group">
              <label>Telefone</label>
              <input type="text" id="nTelefone" />
            </div>
          </div>

          <hr style="margin:1.5rem 0" />

          <h4>ADMIN INICIAL</h4>
          <div class="form-grid">
            <div class="form-group"><input type="text" id="nAdminNome" placeholder="Nome" /></div>
            <div class="form-group"><input type="email" id="nAdminEmail" placeholder="Email" /></div>
            <div class="form-group"><input type="password" id="nAdminSenha" placeholder="Senha" /></div>
          </div>

          <div id="erroNova" class="alert-error" style="display:none"></div>
          <div id="sucessoNova" class="alert-success" style="display:none"></div>

          <button class="btn" onclick="criarEmpresa()">Cadastrar Empresa</button>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- MODAL EDITAR -->
<div class="modal-overlay" id="modalEditarEmpresa">
  <div class="modal">
    <h3>Editar Empresa</h3>
    <input type="hidden" id="editEmpresaId" />

    <div class="form-group"><input type="text" id="editEmpresaNome" placeholder="Nome" /></div>
    <div class="form-group"><input type="email" id="editEmpresaEmail" placeholder="Email" /></div>
    <div class="form-group"><input type="text" id="editEmpresaTel" placeholder="Telefone" /></div>

    <button class="btn" onclick="salvarEmpresa()">Salvar</button>
    <button class="btn-cancel" onclick="fecharModal()">Cancelar</button>
  </div>
</div>

<script>
const API = 'https://agendare-backend-production.up.railway.app/api';
let token = localStorage.getItem('token');
let todasEmpresas = [];

function logout(){ localStorage.clear(); window.location.href='index.html'; }

function mudarAba(aba){
  document.getElementById('abaEmpresas').style.display = aba==='empresas' ? 'block':'none';
  document.getElementById('abaNova').style.display = aba==='nova' ? 'block':'none';
}

async function api(method, path, body){
  const r = await fetch(API+path,{
    method,
    headers:{ 'Content-Type':'application/json', Authorization:'Bearer '+token },
    body: body ? JSON.stringify(body):undefined
  });
  return r.json();
}

async function carregarEmpresas(){
  const data = await api('GET','/empresas');
  todasEmpresas = data || [];
  renderEmpresas(todasEmpresas);
}

function limparBusca(){
  document.getElementById('pesquisaEmpresas').value='';
  renderEmpresas(todasEmpresas);
}

function filtrarEmpresas(){
  const q = document.getElementById('pesquisaEmpresas').value.toLowerCase();
  const filtradas = todasEmpresas.filter(e =>
    e.nome_fantasia.toLowerCase().includes(q) ||
    e.cnpj.includes(q)
  );
  renderEmpresas(filtradas);
}

function renderEmpresas(lista){
  const tbody = document.getElementById('tabelaEmpresas');

  tbody.innerHTML = lista.map(e => `
    <tr>
      <td><strong>${e.nome_fantasia}</strong></td>
      <td>${e.cnpj}</td>
      <td>${e.email||'-'}</td>
      <td>${e.vencimento||'-'}</td>
      <td>${e.status||'-'}</td>
      <td>${e.total_usuarios||0}</td>
      <td>
        <button onclick="abrirEditarEmpresa(${e.id})">✏️</button>
      </td>
    </tr>
  `).join('');
}

function abrirEditarEmpresa(id){
  const e = todasEmpresas.find(x=>x.id===id);
  document.getElementById('editEmpresaId').value=id;
  document.getElementById('editEmpresaNome').value=e.nome_fantasia;
  document.getElementById('editEmpresaEmail').value=e.email||'';
  document.getElementById('editEmpresaTel').value=e.telefone||'';
  document.getElementById('modalEditarEmpresa').classList.add('active');
}

async function salvarEmpresa(){
  const id = document.getElementById('editEmpresaId').value;
  await api('PATCH','/empresas/'+id,{
    nome_fantasia: document.getElementById('editEmpresaNome').value,
    email: document.getElementById('editEmpresaEmail').value,
    telefone: document.getElementById('editEmpresaTel').value
  });
  fecharModal();
  carregarEmpresas();
}

function fecharModal(){ document.getElementById('modalEditarEmpresa').classList.remove('active'); }

async function criarEmpresa(){
  const data = await api('POST','/empresas',{
    cnpj: nCnpj.value,
    nome_fantasia: nNome.value,
    email: nEmail.value,
    telefone: nTelefone.value,
    admin_nome: nAdminNome.value,
    admin_email: nAdminEmail.value,
    admin_senha: nAdminSenha.value
  });

  if(data.erro){ erroNova.textContent=data.erro; erroNova.style.display='block'; return; }

  sucessoNova.textContent='Empresa criada!';
  sucessoNova.style.display='block';

  carregarEmpresas();
}

carregarEmpresas();
</script>

</body>
</html>

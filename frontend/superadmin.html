<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agendare — Super Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>

<body style="background:#0b1220;color:white;font-family:'DM Sans', sans-serif;">

<div style="padding:2rem 3rem;max-width:1200px;margin:auto;">

  <!-- TOPO -->
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem;">
    <h2 style="color:#22d3ee">📅 Agendare</h2>
    <div>
      <span style="margin-right:1rem;color:#22d3ee">⚡ Super Admin</span>
      <button onclick="logout()">Sair</button>
    </div>
  </div>

  <!-- ABAS -->
  <div style="display:flex;gap:1rem;margin-bottom:2rem;">
    <button onclick="mudarAba('empresas')">🏢 Empresas</button>
    <button onclick="mudarAba('nova')">➕ Nova Empresa</button>
  </div>

  <!-- EMPRESAS -->
  <div id="abaEmpresas">
    <h1>Gestão de Empresas</h1>

    <div style="margin:1rem 0;display:flex;gap:1rem;">
      <input id="busca" placeholder="Buscar empresa..." oninput="filtrarEmpresas()" style="flex:1;padding:8px" />
      <button onclick="limparBusca()">Limpar</button>
    </div>

    <table border="1" width="100%" cellpadding="10" style="background:#111827">
      <thead>
        <tr>
          <th>Empresa</th>
          <th>CNPJ</th>
          <th>E-mail</th>
          <th>Status</th>
          <th>Usuários</th>
        </tr>
      </thead>
      <tbody id="tabelaEmpresas"></tbody>
    </table>
  </div>

  <!-- NOVA EMPRESA -->
  <div id="abaNova" style="display:none">
    <h1>Nova Empresa</h1>

    <div style="display:grid;gap:10px;max-width:400px;">
      <input id="nCnpj" placeholder="CNPJ" />
      <input id="nNome" placeholder="Nome Fantasia" />
      <input id="nEmail" placeholder="Email" />
      <input id="nTelefone" placeholder="Telefone" />

      <h3>Admin</h3>
      <input id="nAdminNome" placeholder="Nome" />
      <input id="nAdminEmail" placeholder="Email" />
      <input id="nAdminSenha" placeholder="Senha" type="password" />

      <button onclick="criarEmpresa()">Cadastrar</button>
    </div>
  </div>

</div>

<script>
const API = 'https://agendare-backend-production.up.railway.app/api';
let token = localStorage.getItem('token');
let todasEmpresas = [];

function logout(){ localStorage.clear(); location.href='index.html'; }

function mudarAba(aba){
  abaEmpresas.style.display = aba==='empresas'?'block':'none';
  abaNova.style.display = aba==='nova'?'block':'none';
}

async function api(method, path, body){
  const r = await fetch(API+path,{
    method,
    headers:{ 'Content-Type':'application/json', Authorization:'Bearer '+token },
    body: body?JSON.stringify(body):undefined
  });
  return r.json();
}

async function carregarEmpresas(){
  const data = await api('GET','/empresas');
  todasEmpresas = data || [];
  renderEmpresas(todasEmpresas);
}

function renderEmpresas(lista){
  const tbody = document.getElementById('tabelaEmpresas');

  tbody.innerHTML = lista.map(e => `
    <tr onclick="toggleUsuarios(${e.id})" style="cursor:pointer">
      <td>${e.nome_fantasia}</td>
      <td>${e.cnpj}</td>
      <td>${e.email||'-'}</td>
      <td>${e.status||'-'}</td>
      <td>${e.total_usuarios||0}</td>
    </tr>
    <tr id="u-${e.id}" style="display:none">
      <td colspan="5" id="lista-${e.id}">Carregando...</td>
    </tr>
  `).join('');
}

async function toggleUsuarios(id){
  const row = document.getElementById(`u-${id}`);
  const lista = document.getElementById(`lista-${id}`);

  if(row.style.display==='table-row'){
    row.style.display='none';
    return;
  }

  row.style.display='table-row';

  if(lista.dataset.loaded) return;

  const usuarios = await api('GET',`/empresas/${id}/usuarios`);

  lista.innerHTML = usuarios.map(u=>`
    <div>${u.nome} (${u.email})</div>
  `).join('');

  lista.dataset.loaded = true;
}

function filtrarEmpresas(){
  const q = busca.value.toLowerCase();
  const filtradas = todasEmpresas.filter(e=>
    e.nome_fantasia.toLowerCase().includes(q) || e.cnpj.includes(q)
  );
  renderEmpresas(filtradas);
}

function limparBusca(){ busca.value=''; renderEmpresas(todasEmpresas); }

async function criarEmpresa(){
  await api('POST','/empresas',{
    cnpj:nCnpj.value,
    nome_fantasia:nNome.value,
    email:nEmail.value,
    telefone:nTelefone.value,
    admin_nome:nAdminNome.value,
    admin_email:nAdminEmail.value,
    admin_senha:nAdminSenha.value
  });

  alert('Empresa criada');
  mudarAba('empresas');
  carregarEmpresas();
}

carregarEmpresas();
</script>

</body>
</html>

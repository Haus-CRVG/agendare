<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Agendare — Responder Convite</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="icon" href="assets/favicon.png" />
  <link rel="shortcut icon" href="assets/favicon.png" />
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:1rem; }
    .wrap { width:100%; max-width:480px; }
    .card { background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:2.5rem; box-shadow:var(--shadow-lg); }
    .logo { font-family:'Syne',sans-serif; font-size:1.5rem; font-weight:800; color:var(--accent); margin-bottom:2rem; text-align:center; }
    .logo span { color:var(--text); }
    .detail-row { display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid var(--border); font-size:0.88rem; }
    .detail-row:last-child { border-bottom:none; }
    .detail-label { color:var(--muted); }
    .detail-value { font-weight:600; color:var(--text); text-align:right; }
    .btn-confirmar {
      width:100%; background:#0d9488; color:#fff; border:none;
      border-radius:10px; padding:0.9rem; font-family:'Syne',sans-serif;
      font-weight:700; font-size:1rem; cursor:pointer; margin-top:0.5rem;
      transition:background 0.2s;
    }
    .btn-confirmar:hover { background:#0f766e; }
    .btn-cancelar {
      width:100%; background:#fff; color:#ef4444;
      border:1.5px solid #ef4444; border-radius:10px;
      padding:0.9rem; font-family:'Syne',sans-serif;
      font-weight:700; font-size:1rem; cursor:pointer; margin-top:0.5rem;
      transition:all 0.2s;
    }
    .btn-cancelar:hover { background:#fef2f2; }
    .resultado {
      text-align:center; padding:2rem 0;
    }
    .resultado-icon { font-size:4rem; margin-bottom:1rem; display:block; }
    .resultado-titulo { font-family:'Syne',sans-serif; font-weight:800; font-size:1.3rem; margin-bottom:0.5rem; }
    .resultado-sub { color:var(--muted); font-size:0.88rem; }
  </style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="logo">Agenda<span>re</span></div>
    <div id="conteudo">
      <p style="text-align:center;color:var(--muted)">Carregando convite...</p>
    </div>
  </div>
</div>

<script>
const API = 'http://localhost:3002/api';
const params = new URLSearchParams(window.location.search);
const token  = params.get('token');
const statusAuto = params.get('status'); // confirmar direto pelo link do e-mail

let dadosConvite = null;

async function init() {
  if (!token) { mostrarErro('Link inválido.'); return; }
  try {
    const r = await fetch(`${API}/participantes/responder/${token}`);
    const d = await r.json();
    if (!r.ok) { mostrarErro(d.erro || 'Convite não encontrado.'); return; }
    dadosConvite = d;

    // Se veio com status na URL (clicou direto no e-mail), responde automaticamente
    if (statusAuto === 'confirmado' || statusAuto === 'cancelado') {
      await responder(statusAuto);
      return;
    }

    renderConvite(d);
  } catch { mostrarErro('Erro de conexão. Tente novamente.'); }
}

function renderConvite(d) {
  const nome = d.profissional_nome || d.nome_externo || 'Participante';
  const dt   = new Date(d.data_inicio).toLocaleString('pt-BR', {
    timeZone:'America/Sao_Paulo',
    weekday:'long', day:'2-digit', month:'long',
    year:'numeric', hour:'2-digit', minute:'2-digit'
  });

  // Se já respondeu
  if (d.status !== 'pendente') {
    const icone = d.status === 'confirmado' ? '✅' : '❌';
    const msg   = d.status === 'confirmado' ? 'Você já confirmou sua presença!' : 'Você já cancelou sua participação.';
    document.getElementById('conteudo').innerHTML = `
      <div class="resultado">
        <span class="resultado-icon">${icone}</span>
        <div class="resultado-titulo">${msg}</div>
        <div class="resultado-sub">Este convite já foi respondido.</div>
      </div>`;
    return;
  }

  document.getElementById('conteudo').innerHTML = `
    <h2 style="font-family:'Syne',sans-serif;font-weight:700;font-size:1.1rem;margin-bottom:0.4rem">
      Você foi convidado! 📅
    </h2>
    <p style="color:var(--muted);font-size:0.875rem;margin-bottom:1.5rem">
      Olá <strong>${nome}</strong>, confirme sua participação no agendamento abaixo.
    </p>

    <div style="background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:1.25rem;margin-bottom:1.5rem">
      <div class="detail-row">
        <span class="detail-label">Empresa</span>
        <span class="detail-value">${d.empresa_nome}</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Serviço</span>
        <span class="detail-value">${d.servico_nome}</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Cliente</span>
        <span class="detail-value">${d.cliente_nome}</span>
      </div>
      <div class="detail-row">
        <span class="detail-label">Data e horário</span>
        <span class="detail-value">${dt}</span>
      </div>
      ${d.observacoes ? `
      <div class="detail-row">
        <span class="detail-label">Observações</span>
        <span class="detail-value">${d.observacoes}</span>
      </div>` : ''}
    </div>

    <div id="erroResposta" class="alert alert-error" style="display:none;margin-bottom:1rem"></div>

    <button class="btn-confirmar" onclick="responder('confirmado')">✅ Confirmar presença</button>
    <button class="btn-cancelar"  onclick="responder('cancelado')">❌ Não poderei participar</button>
  `;
}

async function responder(status) {
  try {
    const r = await fetch(`${API}/participantes/responder/${token}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status })
    });
    const d = await r.json();

    if (!r.ok && d.erro !== 'Convite não encontrado ou já respondido') {
      document.getElementById('erroResposta').textContent = d.erro || 'Erro ao responder.';
      document.getElementById('erroResposta').style.display = 'block';
      return;
    }

    // Mostra resultado
    const confirmado = status === 'confirmado';
    document.getElementById('conteudo').innerHTML = `
      <div class="resultado">
        <span class="resultado-icon">${confirmado ? '🎉' : '😔'}</span>
        <div class="resultado-titulo">
          ${confirmado ? 'Presença confirmada!' : 'Participação cancelada'}
        </div>
        <div class="resultado-sub">
          ${confirmado
            ? 'Ótimo! Sua presença foi confirmada. Até lá!'
            : 'Tudo bem! Sua ausência foi registrada.'}
        </div>
      </div>`;
  } catch { mostrarErro('Erro de conexão. Tente novamente.'); }
}

function mostrarErro(msg) {
  document.getElementById('conteudo').innerHTML = `
    <div class="resultado">
      <span class="resultado-icon">❌</span>
      <div class="resultado-titulo">Ops!</div>
      <div class="resultado-sub">${msg}</div>
    </div>`;
}

init();
</script>
</body>
</html>

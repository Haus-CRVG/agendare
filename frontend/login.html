<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agendare — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" href="assets/favicon.png" />
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:1rem; }
    .login-wrap { width:100%; max-width:420px; }
    .login-card { background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:2.5rem; box-shadow:var(--shadow-lg); animation:slideUp 0.4s ease both; }
    .login-logo { text-align:center; margin-bottom:2rem; }
    .login-logo img { max-height:70px; display:inline-block; }
    .login-logo p { font-size:0.82rem; color:var(--muted); margin-top:4px; }
    .step { display:none; }
    .step.active { display:block; animation:slideUp 0.3s ease both; }
    .empresa-card { background:rgba(13,148,136,0.06); border:1px solid rgba(13,148,136,0.25); border-radius:10px; padding:12px 16px; margin-bottom:1rem; display:none; font-size:0.9rem; }
    .empresa-card strong { color:var(--accent); }
    .empresa-bloqueada { background:rgba(220,38,38,0.06); border:1px solid rgba(220,38,38,0.25); border-radius:10px; padding:12px 16px; margin-bottom:1rem; display:none; font-size:0.88rem; color:var(--error); }
    .sa-link { text-align:center; margin-top:1rem; }
    .sa-link button { background:none; border:none; color:var(--muted); font-size:0.78rem; cursor:pointer; text-decoration:underline; font-family:inherit; }
    .sa-link button:hover { color:var(--text); }
    .doc-status { position:absolute; right:12px; top:50%; transform:translateY(-50%); font-size:0.8rem; }
    .input-wrap { position:relative; }
    .input-wrap input { width:100%; padding-right:40px; }
    #ssoLoading { visibility:hidden; opacity:0; position:fixed; inset:0; background:var(--bg); z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:1rem; transition:opacity 0.2s; }
    #ssoLoading.active { visibility:visible; opacity:1; }
    .sso-spinner { width:40px; height:40px; border:3px solid var(--border); border-top-color:var(--accent); border-radius:50%; animation:spin 0.7s linear infinite; }
  </style>
</head>
<body>

  <div id="ssoLoading">
    <img src="assets/logo-agendare.png" style="height:60px;margin-bottom:0.5rem;" onerror="this.style.display='none'" />
    <div class="sso-spinner"></div>
    <p style="color:var(--muted);font-size:0.88rem;">Entrando via integração Implanta...</p>
  </div>

  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">
        <img src="assets/logo-agendare.png" class="logo-img" onerror="this.outerHTML='<div style=&quot;font-family:Syne,sans-serif;font-size:2rem;font-weight:800;color:var(--accent)&quot;>Agend<span style=&quot;color:var(--text)&quot;>are</span></div>'" />
        <p id="loginSubtitulo">Informe o CNPJ ou CPF da sua empresa</p>
      </div>

      <!-- MODO EMPRESA -->
      <div id="modoEmpresa">
        <div class="step active" id="step1">
          <div class="form-group">
            <label>CNPJ ou CPF</label>
            <div class="input-wrap">
              <input type="text" id="docInput" placeholder="Digite o CNPJ ou CPF" maxlength="14"
                oninput="formatarDoc(this)" autocomplete="off" inputmode="numeric" />
              <span class="doc-status" id="docStatus"></span>
            </div>
          </div>
          <div class="empresa-card" id="empresaCard">🏢 <strong id="empresaNome"></strong></div>
          <div class="empresa-bloqueada" id="empresaBloqueada">🔒 <span id="empresaMotivo"></span></div>
          <div id="camposLogin" style="display:none">
            <div class="form-group">
              <label>E-mail</label>
              <input type="email" id="emailInput" placeholder="seu@email.com" autocomplete="email" />
            </div>
            <div class="form-group">
              <label>Senha</label>
              <input type="password" id="senhaInput" placeholder="••••••••"
                onkeydown="if(event.key==='Enter')fazerLogin()" autocomplete="current-password" />
            </div>
            <div id="erroLogin" class="alert alert-error" style="display:none;margin-bottom:1rem"></div>
            <button class="btn btn-primary" style="width:100%;margin-top:0.5rem" onclick="fazerLogin()">
              <span id="btnLoginText">Entrar</span>
              <div class="spinner" id="spinnerLogin"></div>
            </button>
          </div>
        </div>
      </div>

      <!-- MODO SUPER ADMIN -->
      <div id="modoSA" style="display:none">
        <div class="form-group">
          <label>E-mail</label>
          <input type="email" id="saEmail" placeholder="superadmin@email.com" autocomplete="email" />
        </div>
        <div class="form-group">
          <label>Senha</label>
          <input type="password" id="saSenha" placeholder="••••••••"
            onkeydown="if(event.key==='Enter')fazerLoginSA()" autocomplete="current-password" />
        </div>
        <div id="erroSA" class="alert alert-error" style="display:none;margin-bottom:1rem"></div>
        <button class="btn btn-primary" style="width:100%;margin-top:0.5rem" onclick="fazerLoginSA()">
          <span id="btnSAText">Entrar como Super Admin</span>
          <div class="spinner" id="spinnerSA"></div>
        </button>
      </div>

      <div class="sa-link">
        <button id="toggleBtn" onclick="toggleModo()">🔑 Acesso Super Admin</button>
      </div>
    </div>
  </div>

<script>
  const API = 'https://agendare-backend-production.up.railway.app/api';
  let empresaId = null, modoSA = false, docTimer = null;

  /* ── Destino por perfil ── */
  function dest(perfil) {
    return perfil === 'superadmin' ? 'superadmin.html' : 'dashboard.html';
  }

  function toggleModo() {
    modoSA = !modoSA;
    document.getElementById('modoEmpresa').style.display = modoSA ? 'none' : 'block';
    document.getElementById('modoSA').style.display = modoSA ? 'block' : 'none';
    document.getElementById('toggleBtn').textContent = modoSA ? '← Voltar ao login normal' : '🔑 Acesso Super Admin';
    document.getElementById('loginSubtitulo').textContent = modoSA ? 'Painel administrativo global' : 'Informe o CNPJ ou CPF da sua empresa';
  }

  function formatarDoc(input) {
    let v = input.value.replace(/\D/g, '').substring(0, 14);
    input.value = v;
    clearTimeout(docTimer);
    if (v.length === 11 || v.length === 14) {
      docTimer = setTimeout(() => buscarEmpresa(v), 500);
    } else {
      resetarEmpresa();
    }
  }

  async function buscarEmpresa(doc) {
    document.getElementById('docStatus').textContent = '🔍';
    try {
      const r = await fetch(`${API}/auth/empresa/${doc}`);
      const data = await r.json();
      if (!data.encontrado) { document.getElementById('docStatus').textContent = '❌'; resetarEmpresa(); return; }
      if (data.bloqueado) {
        document.getElementById('docStatus').textContent = '🔒';
        document.getElementById('empresaBloqueada').style.display = 'block';
        document.getElementById('empresaCard').style.display = 'none';
        const motivos = { suspenso: 'Conta suspensa. Entre em contato.', cancelado: 'Conta cancelada.' };
        document.getElementById('empresaMotivo').textContent = motivos[data.motivo] || 'Acesso bloqueado';
        document.getElementById('camposLogin').style.display = 'none';
        return;
      }
      document.getElementById('docStatus').textContent = '✅';
      document.getElementById('empresaNome').textContent = data.nome;
      document.getElementById('empresaCard').style.display = 'block';
      document.getElementById('empresaBloqueada').style.display = 'none';
      document.getElementById('camposLogin').style.display = 'block';
      empresaId = data.id;
      setTimeout(() => document.getElementById('emailInput').focus(), 100);
    } catch { document.getElementById('docStatus').textContent = '❌'; }
  }

  function resetarEmpresa() {
    empresaId = null;
    document.getElementById('empresaCard').style.display = 'none';
    document.getElementById('empresaBloqueada').style.display = 'none';
    document.getElementById('camposLogin').style.display = 'none';
  }

  async function fazerLogin() {
    const email = document.getElementById('emailInput').value.trim();
    const senha = document.getElementById('senhaInput').value;
    const erro  = document.getElementById('erroLogin');
    erro.style.display = 'none';
    if (!email || !senha) { erro.textContent = 'Preencha e-mail e senha'; erro.style.display = 'block'; return; }
    if (!empresaId)        { erro.textContent = 'Selecione uma empresa válida'; erro.style.display = 'block'; return; }
    document.getElementById('btnLoginText').style.display = 'none';
    document.getElementById('spinnerLogin').style.display = 'inline-block';
    try {
      const r = await fetch(`${API}/auth/login`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, senha, empresa_id: empresaId })
      });
      const data = await r.json();
      if (!r.ok) { erro.textContent = data.erro || 'E-mail ou senha incorretos'; erro.style.display = 'block'; return; }
      localStorage.setItem('token', data.token);
      localStorage.setItem('usuario', JSON.stringify(data.usuario));
      localStorage.setItem('cnpj_salvo', document.getElementById('docInput').value);
      window.location.href = dest(data.usuario?.perfil);
    } catch { erro.textContent = 'Erro de conexão'; erro.style.display = 'block'; }
    finally {
      document.getElementById('btnLoginText').style.display = 'inline';
      document.getElementById('spinnerLogin').style.display = 'none';
    }
  }

  async function fazerLoginSA() {
    const email = document.getElementById('saEmail').value.trim();
    const senha = document.getElementById('saSenha').value;
    const erro  = document.getElementById('erroSA');
    erro.style.display = 'none';
    if (!email || !senha) { erro.textContent = 'Preencha e-mail e senha'; erro.style.display = 'block'; return; }
    document.getElementById('btnSAText').style.display = 'none';
    document.getElementById('spinnerSA').style.display = 'inline-block';
    try {
      const r = await fetch(`${API}/auth/login`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, senha })
      });
      const data = await r.json();
      if (!r.ok) { erro.textContent = data.erro || 'Acesso negado'; erro.style.display = 'block'; return; }
      localStorage.setItem('token', data.token);
      localStorage.setItem('usuario', JSON.stringify(data.usuario));
      window.location.href = dest(data.usuario?.perfil);
    } catch { erro.textContent = 'Erro de conexão'; erro.style.display = 'block'; }
    finally {
      document.getElementById('btnSAText').style.display = 'inline';
      document.getElementById('spinnerSA').style.display = 'none';
    }
  }

  /* ── INIT ── */
  (async () => {
    /* SSO */
    const ssoToken = new URLSearchParams(window.location.search).get('sso');
    if (ssoToken && ssoToken.length >= 10) {
      history.replaceState({}, '', window.location.pathname);
      document.getElementById('ssoLoading').classList.add('active');
      try {
        const r = await fetch(`${API}/sso/validar`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ sso_token: ssoToken })
        });
        const data = await r.json();
        if (!r.ok) { alert('Erro SSO: ' + (data.erro || 'Token inválido.')); return; }
        localStorage.setItem('token', data.token);
        localStorage.setItem('usuario', JSON.stringify(data.usuario));
        window.location.href = dest(data.usuario?.perfil);
      } catch { alert('Erro de conexão SSO.'); }
      finally { document.getElementById('ssoLoading').classList.remove('active'); }
      return;
    }

    /* Já está logado? Redireciona sem loop */
    const u = JSON.parse(localStorage.getItem('usuario') || 'null');
    const t = localStorage.getItem('token');
    if (u && t) {
      window.location.replace(dest(u.perfil));
      return;
    }

    /* Recarrega CNPJ salvo */
    const cnpjSalvo = localStorage.getItem('cnpj_salvo');
    if (cnpjSalvo) {
      const digits = cnpjSalvo.replace(/\D/g, '');
      const inp = document.getElementById('docInput');
      if (inp && (digits.length === 11 || digits.length === 14)) {
        inp.value = digits;
        buscarEmpresa(digits);
      }
    }
  })();
</script>
</body>
</html>
